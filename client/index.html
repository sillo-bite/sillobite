    (function () {
      // Ensure theme-color meta tag exists (initial default, will be updated by pages)
      let metaThemeColor = document.querySelector('meta[name="theme-color"]');
      if (!metaThemeColor) {
        metaThemeColor = document.createElement('meta');
        metaThemeColor.name = 'theme-color';
        document.head.insertBefore(metaThemeColor, document.head.firstChild);
      }
      // Set initial default color (will be updated by individual pages to match their UI)
      metaThemeColor.content = 'hsl(280, 30%, 98%)';

      // Ensure iOS status bar style meta tag exists
      let appleStatusBar = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
      if (!appleStatusBar) {
        appleStatusBar = document.createElement('meta');
        appleStatusBar.name = 'apple-mobile-web-app-status-bar-style';
        document.head.appendChild(appleStatusBar);
      }
      appleStatusBar.content = 'default';
    })();
  </script>
